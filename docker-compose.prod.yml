services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: libitex-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - libitex

  web:
    build:
      context: .
      dockerfile: apps/web-merchant/Dockerfile
    container_name: libitex-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=https://libitex-api.lunion-lab.com/api/v1
    ports:
      - "127.0.0.1:3011:3001"
    networks:
      - libitex

  redis:
    image: redis:7-alpine
    container_name: libitex-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - libitex

volumes:
  redis-data:

networks:
  libitex:
    driver: bridge

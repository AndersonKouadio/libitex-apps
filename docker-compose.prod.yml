services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: libitex-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_PUBLIC_ENDPOINT=https://libitex-storage.lunion-lab.com
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=libitex-public
      # Credentials MinIO : doivent etre definis dans .env. Sans elles, les uploads
      # echoueront avec une erreur claire "Variables manquantes : STORAGE_ACCESS_KEY,
      # STORAGE_SECRET_KEY" — on les expose explicitement ici pour rappel.
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - libitex

  web:
    build:
      context: .
      dockerfile: apps/web-merchant/Dockerfile
    container_name: libitex-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=https://libitex-api.lunion-lab.com/api/v1
    ports:
      - "127.0.0.1:3011:3001"
    networks:
      - libitex

  redis:
    image: redis:7-alpine
    container_name: libitex-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - libitex

  minio:
    image: minio/minio:latest
    container_name: libitex-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY}
      - MINIO_BROWSER_REDIRECT_URL=https://libitex-storage-console.lunion-lab.com
    volumes:
      - minio-data:/data
    ports:
      # API S3 — proxified par Nginx
      - "127.0.0.1:9000:9000"
      # Console MinIO — proxified par Nginx
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - libitex

volumes:
  redis-data:
  minio-data:

networks:
  libitex:
    driver: bridge

name: Deploy LIBITEX

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: "Composant a deployer"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - web
          - db

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          # Augmente le timeout (defaut 30s) car GitHub Actions a parfois des
          # latences SSH importantes vers les petits VPS.
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            cd /opt/libitex
            COMPONENT="${{ github.event.inputs.component || 'all' }}"
            echo "=== LIBITEX CI/CD Deploy ==="
            echo "Composant : $COMPONENT"
            echo "Commit    : ${{ github.sha }}"
            # deploy.sh fait deja le git pull, le push de schema (api/all/db),
            # le build et le restart Docker. Source unique de verite.
            ./deploy.sh "$COMPONENT"

name: Deploy LIBITEX

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: "Composant a deployer"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - web

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /opt/libitex
            git pull origin main

            COMPONENT="${{ github.event.inputs.component || 'all' }}"

            echo "=== LIBITEX CI/CD Deploy ==="
            echo "Composant: $COMPONENT"
            echo "Commit: ${{ github.sha }}"

            # Quand "all", on ne passe rien a docker compose pour qu'il traite tous les services
            if [ "$COMPONENT" = "all" ]; then
              SERVICES=""
            else
              SERVICES="$COMPONENT"
            fi

            docker compose -f docker-compose.prod.yml build $SERVICES
            docker compose -f docker-compose.prod.yml up -d --force-recreate $SERVICES

            # Verify
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            echo "=== Deploy termine ==="
